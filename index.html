<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f5ef">
<title>Prospect Search</title>
<style>
:root{
  --bg:#f7f5ef;--surf:#fff;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.15);
  --tx:#1f1f1d;--tx2:#6b6b66;--tx3:#95948e;
  --acc:#185fa5;--acc-bg:#E6F1FB;
  --b5-bg:#C0DD97;--b5-tx:#27500A;
  --b4-bg:#EAF3DE;--b4-tx:#3B6D11;
  --b3-bg:#FFF176;--b3-tx:#713F12;
  --b2-bg:#F1EFE8;--b2-tx:#5F5E5A;
  --up:#27500A;--dn:#791F1F;
  --sl-bg:#CCFBF1;--sl-tx:#0F766E;
  --pit-bg:#FEF3C7;--pit-tx:#92400E;
  --str-bg:#FEF3C7;--str-tx:#92400E;
  --inv1-bg:#DBEAFE;--inv1-tx:#1e40af;
  --inv2-bg:#BFDBFE;--inv2-tx:#1d4ed8;
  --inv3-bg:#3B82F6;--inv3-tx:#fff;
  --inv4-bg:#7C3AED;--inv4-tx:#fff;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surf:#242422;--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.18);
    --tx:#f0efe8;--tx2:#a8a79f;--tx3:#75746e;
    --acc:#85B7EB;--acc-bg:#0C447C;
    --b5-bg:#3B6D11;--b5-tx:#EAF3DE;
    --b4-bg:#173404;--b4-tx:#C0DD97;
    --b3-bg:#3D3000;--b3-tx:#FFF176;
    --b2-bg:#2C2C2A;--b2-tx:#B4B2A9;
    --up:#97C459;--dn:#F09595;
    --sl-bg:#0d3330;--sl-tx:#5EEAD4;
    --pit-bg:#451a03;--pit-tx:#FCD34D;
    --str-bg:#451a03;--str-tx:#FCD34D;
    --inv1-bg:#1e3a5f;--inv1-tx:#93C5FD;
    --inv2-bg:#1e3a8a;--inv2-tx:#BFDBFE;
    --inv3-bg:#1d4ed8;--inv3-tx:#fff;
    --inv4-bg:#6D28D9;--inv4-tx:#fff;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);font-size:15px;overscroll-behavior-y:contain}
.tabs{position:sticky;top:0;z-index:10;display:flex;background:var(--bg);border-bottom:.5px solid var(--bdr)}
.tab{flex:1;padding:11px 2px 9px;border:none;background:transparent;color:var(--tx2);font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;line-height:1.2}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.hdr{padding:10px 14px 8px;background:var(--bg)}
.si{position:relative}
.si input{width:100%;height:44px;padding:0 36px 0 13px;border:.5px solid var(--bdr2);border-radius:10px;background:var(--surf);color:var(--tx);font-size:16px;font-family:inherit;-webkit-appearance:none}
.si input:focus{outline:none;border-color:var(--acc)}
.si button{position:absolute;right:8px;top:8px;width:28px;height:28px;border:none;background:transparent;color:var(--tx3);font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center}
.si button.on{display:flex}
.chips{display:flex;gap:6px;padding:8px 14px 6px;overflow-x:auto;background:var(--bg)}
.chips::-webkit-scrollbar{display:none}
.chips2{display:flex;gap:6px;padding:2px 14px 10px;overflow-x:auto;background:var(--bg);border-bottom:.5px solid var(--bdr)}
.chips2::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border:.5px solid var(--bdr2);border-radius:20px;background:var(--surf);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.chip.on{background:var(--acc-bg);color:var(--acc);border-color:var(--acc)}
.meta{padding:5px 14px;font-size:11px;color:var(--tx3);font-weight:500;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.04em;border-bottom:.5px solid var(--bdr)}
.sort-chips{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;flex-shrink:0}
.sort-chips::-webkit-scrollbar{display:none}
.schip{flex-shrink:0;padding:3px 8px;border:.5px solid var(--bdr2);border-radius:20px;background:transparent;color:var(--tx3);font-size:10px;font-weight:500;cursor:pointer;font-family:inherit;text-transform:none;letter-spacing:0}
.schip.on{background:var(--acc-bg);color:var(--acc);border-color:var(--acc)}
.list{padding:0 10px 50px}
.card{background:var(--surf);border:.5px solid var(--bdr);border-radius:10px;padding:9px 10px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:8px}
.card:active{opacity:.65}
.card.recent-hs{border-left:3px solid var(--acc)}
.rnum{flex-shrink:0;width:40px;height:40px;border-radius:8px;background:var(--acc-bg);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;text-align:center;line-height:1.1}
.rnum.pitcher{background:var(--pit-bg);color:var(--pit-tx)}
.rnum.empty{background:var(--b2-bg);color:var(--tx3);font-size:10px}
.pbox{flex-shrink:0;min-width:46px;height:40px;border-radius:8px;background:var(--b2-bg);color:var(--tx);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;padding:0 7px;white-space:nowrap}
.pbox.empty{background:transparent;border:.5px solid var(--bdr);color:var(--tx3)}
.cbody{flex:1;min-width:0}
.r1{display:flex;align-items:center;gap:0;margin-bottom:3px}
.pname{font-size:15px;font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.badge{flex-shrink:0;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500}
.b5{background:var(--b5-bg);color:var(--b5-tx)}.b4{background:var(--b4-bg);color:var(--b4-tx)}.b3{background:var(--b3-bg);color:var(--b3-tx)}.b2{background:var(--b2-bg);color:var(--b2-tx)}
.r2{font-size:12px;color:var(--tx2);display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:2px}
.hs-label{flex-shrink:0;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500;background:var(--acc-bg);color:var(--acc)}
.hs-label.repeat{background:var(--b5-bg);color:var(--b5-tx)}
.hs-label.sleeper{background:var(--sl-bg);color:var(--sl-tx)}
.wk-badge{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;background:var(--acc-bg);color:var(--acc);margin-right:3px}
.wk-badge.streak{background:var(--str-bg);color:var(--str-tx)}
.inv-badge{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:3px}
.inv1{background:var(--inv1-bg);color:var(--inv1-tx)}
.inv2{background:var(--inv2-bg);color:var(--inv2-tx)}
.inv3{background:var(--inv3-bg);color:var(--inv3-tx)}
.inv4{background:var(--inv4-bg);color:var(--inv4-tx)}
.sold-badge{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;background:var(--b4-bg);color:var(--b4-tx);margin-right:3px}
.up{color:var(--up);font-weight:500}.dn{color:var(--dn);font-weight:500}
.empty-msg{text-align:center;padding:50px 20px;color:var(--tx3);font-size:14px}
.spin{text-align:center;padding:50px 20px;color:var(--tx2);font-size:14px}
.spin-ring{width:28px;height:28px;border:2.5px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FCEBEB;color:#791F1F;padding:12px 14px;border-radius:10px;font-size:13px;margin:12px;line-height:1.5}
.rfab{position:fixed;bottom:20px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}
.rfab svg{width:20px;height:20px;fill:white}
.rfab.spin svg{animation:spin .7s linear infinite}
/* Modal */
.mwrap{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mwrap.on{display:flex}
.modal{background:var(--bg);width:100%;max-width:600px;max-height:88vh;border-radius:16px 16px 0 0;padding:18px 18px 28px;overflow-y:auto}
.mhandle{width:34px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 14px}
.mname{font-size:21px;font-weight:500;margin-bottom:3px}
.msub{font-size:13px;color:var(--tx2);margin-bottom:14px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.scard{background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:9px 11px}
.slbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.sval{font-size:17px;font-weight:500;margin-top:2px}
.srow{background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:9px}
.srow-t{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:8px}
.s3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;text-align:center}
.sc-l{font-size:10px;color:var(--tx3)}.sc-v{font-size:14px;font-weight:500;margin-top:1px}
.hs-entry{background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:9px}
.hs-entry.repeat{border-left:3px solid var(--acc)}
.hs-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hs-wk{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--acc-bg);color:var(--acc)}
.hs-lvl{font-size:11px;color:var(--tx2)}
.hs-cat{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--b4-bg);color:var(--b4-tx)}
.hs-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-bottom:8px}
.hs-sl{font-size:10px;color:var(--tx3)}.hs-sv{font-size:13px;font-weight:500}
.hs-notes{font-size:12px;line-height:1.6;color:var(--tx2);border-top:.5px solid var(--bdr);padding-top:8px;margin-top:4px}
.close-btn{width:100%;height:44px;border:.5px solid var(--bdr2);background:var(--surf);color:var(--tx);border-radius:10px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px}
.notes-toggle{width:100%;padding:10px 12px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit}
.notes-toggle span.lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.notes-toggle span.arr{font-size:10px;color:var(--tx3)}
.notes-body{display:none;padding:0 12px 10px}
.notes-body p{font-size:13px;line-height:1.65;margin:0;color:var(--tx)}
.section-hdr{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:8px}
.recent-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bdr)}
.recent-row:last-child{border-bottom:none}
.recent-info{flex:1;min-width:0}
.recent-info .rc-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-info .rc-date{font-size:11px;color:var(--tx3)}
.recent-price{font-size:13px;font-weight:600;flex-shrink:0}
.recent-sale{text-align:right;flex-shrink:0}
.recent-sale .rs-price{font-size:13px;font-weight:600}
.recent-sale .rs-net{font-size:11px}
/* Charts */
.chart-wrap{background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:9px}
.chart-title{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;margin-bottom:8px}
.chart-svg{width:100%;overflow:visible}
.chart-line{fill:none;stroke:var(--acc);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart-line-rank{fill:none;stroke:var(--b3-tx);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart-dot{fill:var(--acc)}.chart-dot-rank{fill:var(--b3-tx)}
.chart-label{font-size:9px;fill:var(--tx3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.chart-val{font-size:10px;fill:var(--tx);font-weight:500;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
/* Card tracker */
.ct-entry{background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:7px}
.ct-entry.sold{border-left:3px solid var(--up)}
.ct-entry.owned{border-left:3px solid var(--acc)}
.ct-name{font-size:12px;font-weight:500;color:var(--tx);margin-bottom:6px;line-height:1.4}
.ct-row{display:flex;gap:12px;flex-wrap:wrap}
.ct-stat{text-align:left}
.ct-l{font-size:10px;color:var(--tx3)}.ct-v{font-size:13px;font-weight:500;margin-top:1px}
.ct-serial{font-size:10px;color:var(--tx3);margin-top:4px}
.port-player{cursor:pointer}
</style>
</head>
<body>

<div class="tabs" id="tabs">
  <button class="tab on" data-t="all">All</button>
  <button class="tab" data-t="t200">Top 200 Hitters</button>
  <button class="tab" data-t="t100">Top 100 Pitchers</button>
  <button class="tab" data-t="hs">Hot Sheet</button>
  <button class="tab" data-t="port">Portfolio</button>
</div>

<div class="hdr">
  <div class="si">
    <input id="search" placeholder="Search player or team..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="clear">×</button>
  </div>
</div>

<div class="chips" id="chips">
  <button class="chip on" data-f="all">All BR</button>
  <button class="chip" data-f="5">BR 5</button>
  <button class="chip" data-f="4">BR 4+</button>
  <button class="chip" data-f="owned">Owned</button>
  <button class="chip" data-f="sold">Sold</button>
</div>
<div class="chips2" id="chips2">
  <button class="chip on" data-p="all">All</button>
  <button class="chip" data-p="hit">Hitters</button>
  <button class="chip" data-p="pit">Pitchers</button>
</div>

<div class="meta"><span id="cntlbl">Loading...</span><div class="sort-chips" id="sortchips"></div></div>
<div class="list" id="list"><div class="spin"><div class="spin-ring"></div>Fetching from Google Sheets...</div></div>

<button class="rfab" id="rfab" title="Refresh">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<div class="mwrap" id="mwrap">
  <div class="modal">
    <div class="mhandle"></div>
    <div id="mcontent"></div>
    <button class="close-btn" id="closebtn">Close</button>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const SID         = '15pRN3ILeyfbPG2OMRxh0OUtqg6MZCaLMMjwf4yxDV74';
const TRACKER_SID = '12sNofzPwhb8uR68hT_bJNiLD2MrM0rdoQMPXGTlx2_s';
const KEY         = 'AIzaSyCl43LqZrRJ-MlPkKiKjk51O2Aklv-T0RE';
const BASE        = `https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/`;
const TRACKER_BASE= `https://sheets.googleapis.com/v4/spreadsheets/${TRACKER_SID}/values/`;

const TEAM_NAMES = {
  ARI:'Arizona Diamondbacks',ATL:'Atlanta Braves',BAL:'Baltimore Orioles',
  BOS:'Boston Red Sox',CHC:'Chicago Cubs',CHW:'Chicago White Sox',
  CIN:'Cincinnati Reds',CLE:'Cleveland Guardians',COL:'Colorado Rockies',
  DET:'Detroit Tigers',HOU:'Houston Astros',KC:'Kansas City Royals',
  LAA:'Los Angeles Angels',LAD:'Los Angeles Dodgers',MIA:'Miami Marlins',
  MIL:'Milwaukee Brewers',MIN:'Minnesota Twins',NYM:'New York Mets',
  NYY:'New York Yankees',OAK:'Oakland Athletics',PHI:'Philadelphia Phillies',
  PIT:'Pittsburgh Pirates',SD:'San Diego Padres',SEA:'Seattle Mariners',
  SF:'San Francisco Giants',STL:'St. Louis Cardinals',TB:'Tampa Bay Rays',
  TEX:'Texas Rangers',TOR:'Toronto Blue Jays',WSN:'Washington Nationals',
  SFG:'San Francisco Giants',SDP:'San Diego Padres',TBR:'Tampa Bay Rays',WSH:'Washington Nationals'
};

const SORT_OPTS = {
  all:  [{k:'default',l:'BR'},{k:'rank',l:'Rank'},{k:'name',l:'Name'},{k:'price',l:'Price'},{k:'owned',l:'$ Owned'}],
  t200: [{k:'default',l:'Rank'},{k:'name',l:'Name'},{k:'price',l:'Price'},{k:'owned',l:'$ Owned'}],
  t100: [{k:'default',l:'Rank'},{k:'name',l:'Name'},{k:'price',l:'Price'},{k:'owned',l:'$ Owned'}],
  hs:   [{k:'default',l:'Recent'},{k:'weeks',l:'Weeks'},{k:'streak',l:'Streak'},{k:'name',l:'Name'},{k:'owned',l:'$ Owned'}],
};

// ── State ─────────────────────────────────────────────────────────────────────
let players=[], top200=[], top100=[], origTop200=[], origTop100=[], hotsheet=[], cards=[];
let tab='all', brf='all', posf='all', q='', sortBy='default';

// Global cache — built once after load, cleared on refresh
let CACHE = null;

// ── Pure helpers ──────────────────────────────────────────────────────────────
const cl      = v => (!v||String(v).trim()===''||v==='-'||v==='—'||v==='\\-') ? null : String(v).trim();
const fmt     = v => cl(v) ?? '—';
const fmtP    = v => { const c=cl(v); return c?(c.startsWith('$')?c:'$'+c):'—'; };
const normName= v => (v||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const parseDate=v => { if(!v) return 0; const d=new Date(v); return isNaN(d)?0:d.getTime(); };
const fmtDateLabel=v=>{ if(!v) return ''; const d=new Date(v); return isNaN(d)?'':  `${d.getMonth()+1}/${d.getDate()}`; };
const fmtShortDate=v=>{ if(!v) return '—'; const d=new Date(v); return isNaN(d)?v:`${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`; };
const safeNum =(v,neg=false)=>parseFloat(String(v||'0').replace(neg?/[^0-9.-]/g:/[^0-9.]/g,''))||0;
const fmtMoney=v=>{ const n=safeNum(v); return n===0&&!v?'—':`$${n.toFixed(2)}`; };

const fmtDiff=v=>{
  if(!cl(v)) return '—';
  const n=parseFloat(v); if(isNaN(n)) return '—';
  return `<span class="${n>0?'up':'dn'}">${n>0?'+':''}${n}</span>`;
};
const fmtPct=v=>{
  if(!cl(v)) return '—';
  const n=parseFloat(String(v).replace('%',''));
  if(isNaN(n)) return String(v);
  return `<span class="${n>0?'up':n<0?'dn':''}">${n>0?'+':''}${n.toFixed(1)}%</span>`;
};
const badge=br=>{
  if(!br) return '';
  const n=parseInt(br); if(isNaN(n)) return '';
  return `<span class="badge ${{5:'b5',4:'b4',3:'b3'}[n]||'b2'}">BR ${n}</span>`;
};
const matchQ=(name,team)=>{
  if(!q) return true;
  const t=q.toLowerCase();
  return (name||'').toLowerCase().includes(t)||
         (team||'').toLowerCase().includes(t)||
         (TEAM_NAMES[team||'']||'').toLowerCase().includes(t);
};
const invTier=amt=>{
  if(amt<=0) return null;
  if(amt<=25) return 'inv1'; if(amt<=50) return 'inv2';
  if(amt<=100) return 'inv3'; return 'inv4';
};

// ── Build global cache after data load ───────────────────────────────────────
function buildCache() {
  CACHE = new Map();

  // Pre-compute max weeks for hitter/pitcher hot sheet streaks
  const hitWeeks = hotsheet.filter(h=>!(h.pos||'').toLowerCase().includes('pitcher')).map(h=>parseInt(h.week)||0);
  const pitWeeks = hotsheet.filter(h=>(h.pos||'').toLowerCase().includes('pitcher')).map(h=>parseInt(h.week)||0);
  const maxHitWk = hitWeeks.length ? Math.max(...hitWeeks) : 0;
  const maxPitWk = pitWeeks.length ? Math.max(...pitWeeks) : 0;

  // Collect all unique player names across all sources
  const allNames = new Set([
    ...players.map(p=>p.name),
    ...top200.map(p=>p.name),
    ...top100.map(p=>p.name),
    ...origTop200.map(p=>p.name),
    ...origTop100.map(p=>p.name),
    ...hotsheet.map(p=>p.name),
  ]);

  allNames.forEach(name=>{
    const nm = normName(name);
    const entry = {};

    // ── Resolved data (price, rank, label, priceChange) ──
    const srcPri = {top:0, hs:1, orig:2, buy:3};
    const candidates = [];
    const buyEntry = players.find(b=>normName(b.name)===nm);
    if(buyEntry) candidates.push({src:'buy', ts:parseDate(buyEntry.date), rank:null, price:cl(buyEntry.price)});

    const topEntries = [...top200,...top100].filter(e=>normName(e.name)===nm);
    topEntries.forEach(e=>candidates.push({src:'top', ts:parseDate(e.date), rank:cl(e.rank), price:cl(e.price)}));
    [...origTop200,...origTop100].filter(e=>normName(e.name)===nm).forEach(e=>
      candidates.push({src:'orig', ts:parseDate(e.date), rank:null, price:cl(e.price)}));
    const hsEntries = hotsheet.filter(h=>normName(h.name)===nm);
    hsEntries.forEach(h=>candidates.push({src:'hs', ts:parseDate(h.date), rank:null, price:cl(h.auto)}));

    if(candidates.length) {
      candidates.sort((a,b)=>b.ts!==a.ts?b.ts-a.ts:srcPri[a.src]-srcPri[b.src]);
      const best = candidates[0];
      const topRank = topEntries.length
        ? topEntries.reduce((a,b)=>parseDate(b.date)>=parseDate(a.date)?b:a).rank : null;
      entry.rank  = cl(topRank);
      entry.price = best.price;
      entry.buy   = buyEntry ? cl(buyEntry.buy) : null;

      // HS label from most recent HS entry
      let hsLabel = null;
      if(hsEntries.length) {
        const hs = hsEntries.reduce((a,b)=>parseDate(b.date)>=parseDate(a.date)?b:a);
        if(hs.repeat) hsLabel='Repeat';
        else if(cl(hs.category)) hsLabel=cl(hs.category);
      }
      entry.hsLabel = hsLabel;

      // Price change
      const buyPrice = buyEntry ? cl(buyEntry.price) : null;
      entry.priceChange = null;
      if(buyPrice && best.price && best.src!=='buy') {
        const orig=safeNum(buyPrice), now=safeNum(best.price);
        if(orig>0) entry.priceChange={orig:buyPrice, now:best.price, pct:parseFloat(((now-orig)/orig*100).toFixed(0))};
      }
    } else {
      entry.rank=null; entry.price=null; entry.buy=null; entry.hsLabel=null; entry.priceChange=null;
    }

    // ── Card stats ──
    const playerCards = cards.filter(c=>normName(c.player)===nm);
    const owned = playerCards.filter(c=>!c.salePrice);
    const sold  = playerCards.filter(c=> c.salePrice);
    const totalInvested  = owned.reduce((s,c)=>s+safeNum(c.purchasePrice),0);
    const totalSoldFor   = sold.reduce((s,c)=>s+safeNum(c.salePrice),0);
    const totalNetProfit = sold.reduce((s,c)=>s+safeNum(c.netProfit,true),0);
    const daysArr = sold.filter(c=>c.daysOwned).map(c=>parseFloat(c.daysOwned)).filter(n=>!isNaN(n));
    const avgHold = daysArr.length ? Math.round(daysArr.reduce((a,b)=>a+b,0)/daysArr.length) : null;
    const bestFlip= sold.reduce((best,c)=>{ const p=safeNum(c.netProfit,true); return (!best||p>safeNum(best.netProfit,true))?c:best; },null);
    entry.cards = {owned, sold, totalInvested, totalSoldFor, totalNetProfit, avgHold, bestFlip};

    // ── Hot sheet info ──
    const isPit = (players.find(p=>normName(p.name)===nm)?.pos||'').toLowerCase().includes('pitcher') ||
                  (hsEntries[0]?.pos||'').toLowerCase().includes('pitcher');
    const maxWk = isPit ? maxPitWk : maxHitWk;
    const playerWeeks = [...new Set(hsEntries.map(h=>parseInt(h.week)).filter(n=>!isNaN(n)))].sort((a,b)=>a-b);
    const onLatest = playerWeeks.includes(maxWk);
    let streak=0;
    if(onLatest){ streak=1; for(let w=maxWk-1;w>=1;w--){ if(playerWeeks.includes(w)) streak++; else break; } }
    entry.hsInfo = {totalAppearances:playerWeeks.length, onLatest, streak, maxWeek:maxWk};

    // Store by normalized name
    CACHE.set(nm, entry);
  });
}

// Cache accessors — these replace the old per-call functions
const getResolved  = name => CACHE?.get(normName(name)) || {rank:null,price:null,buy:null,hsLabel:null,priceChange:null};
const getCardStats = name => CACHE?.get(normName(name))?.cards || {owned:[],sold:[],totalInvested:0,totalSoldFor:0,totalNetProfit:0,avgHold:null,bestFlip:null};
const getHsInfo    = name => CACHE?.get(normName(name))?.hsInfo || {totalAppearances:0,onLatest:false,streak:0,maxWeek:0};

  const r = await fetch(BASE+encodeURIComponent(rng)+'?key='+KEY);
  if(!r.ok) throw new Error(`${rng}: HTTP ${r.status}`);
  return (await r.json()).values||[];
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function renderSortChips() {
  const opts = SORT_OPTS[tab];
  const el = document.getElementById('sortchips');
  if(!opts){ el.innerHTML=''; return; }
  el.innerHTML = opts.map(o=>
    `<button class="schip${sortBy===o.k||(!opts.find(x=>x.k===sortBy)&&o.k==='default')?' on':''}" data-s="${o.k}">${o.l}</button>`
  ).join('');
}

function applySort(pool, defaultSort) {
  const s = SORT_OPTS[tab]?.find(o=>o.k===sortBy) ? sortBy : 'default';
  if(s==='default') return defaultSort(pool);
  if(s==='name') return pool.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  const cache = new Map();
  pool.forEach(p=>{
    const d = getResolved(p.name);
    const cs = getCardStats(p.name);
    const hi = getHsInfo(p.name);
    const val =
      s==='rank'   ? (parseInt(d.rank)||9999) :
      s==='price'  ? safeNum(d.price) :
      s==='owned'  ? cs.totalInvested :
      s==='weeks'  ? hi.totalAppearances :
      s==='streak' ? hi.streak : 0;
    cache.set(p.name, val);
  });

  return pool.slice().sort((a,b)=>{
    const va=cache.get(a.name)??0, vb=cache.get(b.name)??0;
    return s==='rank' ? va-vb : vb-va;
  });
}

// ── Pool ──────────────────────────────────────────────────────────────────────
function mostRecent(arr) {
  const seen = new Map();
  arr.forEach(r=>{ const ts=parseDate(r.date); if(!seen.has(r.name)||ts>seen.get(r.name)._ts) seen.set(r.name,{...r,_ts:ts}); });
  return [...seen.values()];
}

function getPool() {
  if(tab==='t200'){ const b=mostRecent(top200).filter(r=>matchQ(r.name,r.team)); return applySort(b,p=>p.slice().sort((a,b)=>parseInt(a.rank)-parseInt(b.rank))); }
  if(tab==='t100'){ const b=mostRecent(top100).filter(r=>matchQ(r.name,r.team)); return applySort(b,p=>p.slice().sort((a,b)=>parseInt(a.rank)-parseInt(b.rank))); }
  if(tab==='hs')  { const b=mostRecent(hotsheet).filter(r=>matchQ(r.name,r.aff)); return applySort(b,p=>p.slice().sort((a,b)=>parseDate(b.date)-parseDate(a.date))); }
  if(tab==='port') return [];

  let pool=[...players];
  if(brf==='5') pool=pool.filter(p=>parseInt(p.buy)===5);
  else if(brf==='4') pool=pool.filter(p=>parseInt(p.buy)>=4);
  else if(brf==='owned') pool=pool.filter(p=>getCardStats(p.name).owned.length>0);
  else if(brf==='sold')  pool=pool.filter(p=>getCardStats(p.name).sold.length>0);
  if(posf==='hit') pool=pool.filter(p=>(p.pos||'').toLowerCase().includes('hitter'));
  else if(posf==='pit') pool=pool.filter(p=>(p.pos||'').toLowerCase().includes('pitcher'));
  pool=pool.filter(p=>matchQ(p.name,p.team));
  return applySort(pool,p=>p.slice().sort((a,b)=>{
    const ab=parseInt(a.buy)||0,bb=parseInt(b.buy)||0;
    if(ab!==bb) return bb-ab;
    return safeNum(b.price)-safeNum(a.price);
  }));
}

// ── Card builder ──────────────────────────────────────────────────────────────
function buildCard(name, team, pos, i, tp, overrides={}) {
  const d      = getResolved(name);
  const rank   = overrides.rank  ?? d.rank;
  const price  = overrides.price ?? d.price;
  const cs     = getCardStats(name);
  const hi     = getHsInfo(name);
  const hsLabel= d.hsLabel;
  const isRepeat  = hsLabel&&hsLabel.toLowerCase().includes('repeat');
  const isSleeper = hsLabel&&hsLabel.toLowerCase().includes('sleeper');
  const isPitcher = (pos||'').toLowerCase().includes('pitcher');

  const rankHtml = rank
    ? `<div class="rnum${isPitcher?' pitcher':''}">#${rank}</div>`
    : `<div class="rnum empty">—</div>`;

  const priceStr = price?(String(price).startsWith('$')?price:'$'+price):'';
  const priceHtml= priceStr?`<div class="pbox">${priceStr}</div>`:`<div class="pbox empty">—</div>`;

  let labelHtml='';
  if(hsLabel){ const cls=isRepeat?'repeat':isSleeper?'sleeper':''; labelHtml=`<span class="hs-label${cls?' '+cls:''}">${hsLabel}</span>`; }

  // Week badges — Hot Sheet tab only
  let wkHtml='';
  if(tab==='hs' && hi.totalAppearances>0){
    if(hi.streak>=2) wkHtml+=`<span class="wk-badge streak">${hi.streak} Straight</span>`;
    else if(hi.onLatest) wkHtml+=`<span class="wk-badge">Most Recent</span>`;
    if(hi.totalAppearances>1) wkHtml+=`<span class="wk-badge">x${hi.totalAppearances}</span>`;
  }

  // Inventory badges
  let invHtml='';
  if(cs.owned.length>0){ const tier=invTier(cs.totalInvested); invHtml+=`<span class="inv-badge ${tier}">${cs.owned.length} owned · $${cs.totalInvested.toFixed(0)}</span>`; }
  if(cs.sold.length>0) invHtml+=`<span class="sold-badge">${cs.sold.length} sold</span>`;

  const borderClass = hi.onLatest?' recent-hs':'';

  return `<div class="card${borderClass}" data-i="${i}" data-tp="${tp}">
    ${rankHtml}
    <div class="cbody">
      <div class="r1"><span class="pname">${name}</span></div>
      <div class="r2">
        <span>${team||''}</span><span>${pos||''}</span>
        ${labelHtml}${d.buy?badge(d.buy):''}${wkHtml}${invHtml}
      </div>
    </div>
    ${priceHtml}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const isTop=tab==='t200'||tab==='t100', isHS=tab==='hs', isPort=tab==='port';
  const showChips=!isTop&&!isHS&&!isPort;
  document.getElementById('chips').style.display=showChips?'flex':'none';
  document.getElementById('chips2').style.display=showChips?'flex':'none';
  renderSortChips();
  if(isPort){ renderPortfolio(); return; }

  const pool=getPool();
  document.getElementById('cntlbl').textContent=`${pool.length} player${pool.length===1?'':'s'}`;
  if(!pool.length){ document.getElementById('list').innerHTML='<div class="empty-msg">No players match</div>'; return; }

  let html='';
  if(isHS) html=pool.map((r,i)=>buildCard(r.name,r.aff,r.pos,i,'hs')).join('');
  else if(isTop) html=pool.map((r,i)=>buildCard(r.name,r.team,tab==='t200'?'Hitter':'Pitcher',i,'top',{rank:r.rank,price:r.price})).join('');
  else html=pool.map((p,i)=>buildCard(p.name,p.team,p.pos,i,'player')).join('');

  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('#list .card').forEach(c=>{
    c.addEventListener('click',()=>showDetail(pool[+c.dataset.i],c.dataset.tp));
  });
}

// ── History charts ────────────────────────────────────────────────────────────
function buildHistoryCharts(name) {
  const nm=normName(name);
  const pricePoints=[], rankPoints=[];
  const add=(dateVal,rawVal,list)=>{
    const ts=parseDate(dateVal); if(!ts||!rawVal) return;
    const n=parseFloat(String(rawVal).replace(/[^0-9.]/g,'')); if(isNaN(n)) return;
    list.push({label:fmtDateLabel(dateVal),ts,val:n});
  };
  const buyE=players.find(b=>normName(b.name)===nm);
  if(buyE){ add(buyE.date,buyE.price,pricePoints); add(buyE.date,buyE.hobby,rankPoints); }
  [...origTop200,...origTop100].filter(e=>normName(e.name)===nm).forEach(e=>{ add(e.date,e.price,pricePoints); add(e.date,e.rank,rankPoints); });
  [...top200,...top100].filter(e=>normName(e.name)===nm).forEach(e=>{ add(e.date,e.price,pricePoints); add(e.date,e.rank,rankPoints); });
  hotsheet.filter(h=>normName(h.name)===nm).forEach(h=>{ add(h.date,h.auto,pricePoints); add(h.date,h.hobby,rankPoints); });

  const dedup=pts=>{ pts.sort((a,b)=>a.ts-b.ts); const m=new Map(); pts.forEach(p=>{ if(!m.has(p.ts)) m.set(p.ts,p); }); return [...m.values()]; };
  const prices=dedup(pricePoints).filter(p=>!isNaN(p.val));
  const ranks=dedup(rankPoints).filter(p=>!isNaN(p.val));

  const makeSvg=(points,isRank)=>{
    if(points.length<2) return '';
    const W=280,H=68,Pt=20,Pb=22,Pl=10,Pr=10,iW=W-Pl-Pr,iH=H-Pt-Pb;
    const vals=points.map(p=>p.val);
    let minV=Math.min(...vals),maxV=Math.max(...vals);
    if(minV===maxV){minV=Math.max(0,minV*0.85);maxV=maxV*1.15||1;}
    const yS=v=>isRank?Pt+(v-minV)/(maxV-minV)*iH:Pt+(1-(v-minV)/(maxV-minV))*iH;
    const xS=i=>Pl+(points.length===1?iW/2:i/(points.length-1)*iW);
    const pts=points.map((p,i)=>({...p,x:xS(i),y:yS(p.val)}));
    const poly=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const cls=isRank?'chart-line-rank':'chart-line', dc=isRank?'chart-dot-rank':'chart-dot';
    const dots=pts.map((p,i)=>{
      const first=i===0,last=i===pts.length-1,anc=first?'start':last?'end':'middle';
      return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" class="${dc}"/>
        ${(first||last)?`<text x="${p.x.toFixed(1)}" y="${(p.y-6).toFixed(1)}" text-anchor="${anc}" class="chart-val">${isRank?'#':'$'}${p.val}</text>`:''}
        <text x="${p.x.toFixed(1)}" y="${(H-3).toFixed(1)}" text-anchor="${anc}" class="chart-label">${p.label}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg"><polyline points="${poly}" class="${cls}"/>${dots}</svg>`;
  };
  let html='';
  const pSvg=makeSvg(prices,false), rSvg=makeSvg(ranks,true);
  if(pSvg) html+=`<div class="chart-wrap"><div class="chart-title">Price history</div>${pSvg}</div>`;
  if(rSvg) html+=`<div class="chart-wrap"><div class="chart-title">Rank history <span style="font-size:9px;color:var(--tx3)">(lower = better)</span></div>${rSvg}</div>`;
  return html;
}

  const ownedRows = owned.map(c=>`<div class="ct-entry owned">
    <div class="ct-name">${c.fullCard||'—'}</div>
    <div class="ct-row">
      <div class="ct-stat"><div class="ct-l">Purchased</div><div class="ct-v">${fmtShortDate(c.datePurchased||c.transactionDate)}</div></div>
      <div class="ct-stat"><div class="ct-l">Cost</div><div class="ct-v">${fmtMoney(c.purchasePrice)}</div></div>
    </div>
    ${c.serialNo?`<div class="ct-serial">/${c.serialNo}</div>`:''}
  </div>`).join('');

  const soldRows = sold.map(c=>{ const p=safeNum(c.netProfit,true); return `<div class="ct-entry sold">
    <div class="ct-name">${c.fullCard||'—'}</div>
    <div class="ct-row">
      <div class="ct-stat"><div class="ct-l">Sold</div><div class="ct-v">${fmtShortDate(c.transactionDate)}</div></div>
      <div class="ct-stat"><div class="ct-l">Cost</div><div class="ct-v">${fmtMoney(c.purchasePrice)}</div></div>
      <div class="ct-stat"><div class="ct-l">Sold for</div><div class="ct-v">${fmtMoney(c.salePrice)}</div></div>
      <div class="ct-stat"><div class="ct-l">Net</div><div class="ct-v"><span class="${p>=0?'up':'dn'}">${p>=0?'+':''}$${Math.abs(p).toFixed(2)}</span></div></div>
    </div>
    ${c.serialNo?`<div class="ct-serial">/${c.serialNo}</div>`:''}
  </div>`; }).join('');

  return `<div class="section-hdr">My cards</div>${summary}${flip}
    ${owned.length?`<div class="section-hdr">Owned (${owned.length})</div>${ownedRows}`:''}
    ${sold.length?`<div class="section-hdr" style="margin-top:${owned.length?'12px':'0'}">Sold (${sold.length})</div>${soldRows}`:''}`;
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function showDetail(p, tp) {
  const nm     = normName(p.name);
  const master = players.find(b=>normName(b.name)===nm);
  const d      = getResolved(p.name);
  const hist   = hotsheet.filter(h=>normName(h.name)===nm).sort((a,b)=>parseDate(b.date)-parseDate(a.date));
  const topE   = [...mostRecent(top200),...mostRecent(top100)].find(e=>normName(e.name)===nm);

  const currentPrice = d.price?(String(d.price).startsWith('$')?d.price:'$'+d.price):'—';
  const currentRank  = d.rank?'#'+d.rank:'—';

  const hsWeeks=[...new Set(hist.map(h=>h.week).filter(Boolean))].sort((a,b)=>parseInt(a)-parseInt(b));
  const wksHtml=hsWeeks.length?`<div style="margin-bottom:9px">${hsWeeks.map(w=>`<span class="wk-badge">Wk${w}</span>`).join('')}</div>`:'';

  const html=`
    <div class="mname">${p.name}</div>
    <div class="msub">${master?master.team:p.team||p.aff||''} · ${master?master.pos:p.pos||''}${master&&master.buy?' · Buy Rating '+master.buy:''}</div>

    <div class="sgrid">
      <div class="scard"><div class="slbl">Rank</div><div class="sval">${currentRank}</div></div>
      <div class="scard"><div class="slbl">Price</div><div class="sval">${currentPrice}</div></div>
      <div class="scard"><div class="slbl">Age</div><div class="sval">${fmt(master?master.age:p.age)}</div></div>
      <div class="scard"><div class="slbl">Buy Rating</div><div class="sval">${fmt(master?master.buy:null)}</div></div>
    </div>

    ${master&&master.notes?`<div class="srow" style="padding:0;overflow:hidden">
      <button class="notes-toggle" onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'block':'none';this.querySelector('.arr').textContent=b.style.display==='none'?'▼':'▲'">
        <span class="lbl">Buy Sheet Notes</span><span class="arr">▼</span>
      </button>
      <div class="notes-body"><p>${master.notes}</p></div>
    </div>`:''}

    ${master?`<div class="srow"><div class="srow-t">Source ranks</div><div class="s3">
      <div><div class="sc-l">MLB</div><div class="sc-v">${fmt(master.mlb)}</div></div>
      <div><div class="sc-l">DD</div><div class="sc-v">${fmt(master.dd)}</div></div>
      <div><div class="sc-l">Roto</div><div class="sc-v">${fmt(master.roto)}</div></div>
      <div><div class="sc-l">StS</div><div class="sc-v">${fmt(master.sts)}</div></div>
      <div><div class="sc-l">BA</div><div class="sc-v">${fmt(master.ba)}</div></div>
      <div><div class="sc-l">Hobby</div><div class="sc-v">${fmt(master.hobby)}</div></div>
    </div></div>`:''}

    ${topE?`<div class="srow"><div class="srow-t">Latest ranking</div><div class="s3">
      <div><div class="sc-l">Rank</div><div class="sc-v">#${topE.rank}</div></div>
      <div><div class="sc-l">Prev</div><div class="sc-v">${fmt(topE.prev)}</div></div>
      <div><div class="sc-l">Change</div><div class="sc-v">${fmtDiff(topE.diff)}</div></div>
    </div></div>`:''}

    ${master&&master.lastYr?`<div class="srow"><div class="srow-t">Year over year</div><div class="s3">
      <div><div class="sc-l">Last year</div><div class="sc-v">$${master.lastYr}</div></div>
      <div><div class="sc-l">Now</div><div class="sc-v">${fmtP(master.price)}</div></div>
      <div><div class="sc-l">Change</div><div class="sc-v">${fmtPct(master.chg)}</div></div>
    </div></div>`:''}

    ${d.priceChange?`<div class="srow"><div class="srow-t">Price movement</div><div class="s3">
      <div><div class="sc-l">Original</div><div class="sc-v">$${safeNum(d.priceChange.orig).toFixed(2)}</div></div>
      <div><div class="sc-l">Current</div><div class="sc-v">$${safeNum(d.priceChange.now).toFixed(2)}</div></div>
      <div><div class="sc-l">Change</div><div class="sc-v">${fmtPct(d.priceChange.pct)}</div></div>
    </div></div>`:''}

    ${buildHistoryCharts(p.name)}
    ${wksHtml}
    ${modalHsHistory(hist)}
    ${modalCards(p.name)}`;

  document.getElementById('mcontent').innerHTML=html;
  document.getElementById('mwrap').classList.add('on');
}

// ── Portfolio ─────────────────────────────────────────────────────────────────
function renderPortfolio() {
  const prospectNames = new Set([
    ...players,...top200,...top100,...origTop200,...origTop100,...hotsheet
  ].map(p=>normName(p.name)));

  const prospectCards = cards.filter(c=>prospectNames.has(normName(c.player)));
  const allOwned = prospectCards.filter(c=>!c.salePrice);
  const allSold  = prospectCards.filter(c=> c.salePrice);
  const totalInvested   = allOwned.reduce((s,c)=>s+safeNum(c.purchasePrice),0);
  const totalSoldFor    = allSold.reduce((s,c)=>s+safeNum(c.salePrice),0);
  const totalNetProfit  = allSold.reduce((s,c)=>s+safeNum(c.netProfit,true),0);

  const recentPurchases = [...allOwned].filter(c=>c.datePurchased||c.transactionDate)
    .sort((a,b)=>parseDate(b.datePurchased||b.transactionDate)-parseDate(a.datePurchased||a.transactionDate)).slice(0,5);
  const recentSales = [...allSold].filter(c=>c.transactionDate)
    .sort((a,b)=>parseDate(b.transactionDate)-parseDate(a.transactionDate)).slice(0,5);

  const byPlayer = new Map();
  prospectCards.forEach(c=>{
    const k=normName(c.player);
    if(!byPlayer.has(k)) byPlayer.set(k,{name:k,ownedCards:[],soldCards:[],totalInvested:0,totalSoldFor:0,totalNet:0});
    const e=byPlayer.get(k);
    if(!c.salePrice){ e.ownedCards.push(c); e.totalInvested+=safeNum(c.purchasePrice); }
    else{ e.soldCards.push(c); e.totalSoldFor+=safeNum(c.salePrice); e.totalNet+=safeNum(c.netProfit,true); }
  });
  const playerList=[...byPlayer.values()].sort((a,b)=>b.totalInvested-a.totalInvested);

  const summaryHtml=`
    <div class="srow" style="margin-bottom:11px"><div class="srow-t">Portfolio summary</div><div class="s3">
      <div><div class="sc-l">Cards owned</div><div class="sc-v">${allOwned.length}</div></div>
      <div><div class="sc-l">Total invested</div><div class="sc-v">$${totalInvested.toFixed(0)}</div></div>
      <div><div class="sc-l">Cards sold</div><div class="sc-v">${allSold.length}</div></div>
    </div></div>
    <div class="srow" style="margin-bottom:11px"><div class="srow-t">Sales performance</div><div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;text-align:center">
      <div><div class="sc-l">Sold for</div><div class="sc-v">$${totalSoldFor.toFixed(0)}</div></div>
      <div><div class="sc-l">Net profit</div><div class="sc-v"><span class="${(totalSoldFor-totalInvested)>=0?'up':'dn'}">${(totalSoldFor-totalInvested)>=0?'+':''}$${(totalSoldFor-totalInvested).toFixed(2)}</span></div></div>
      <div><div class="sc-l">ROI</div><div class="sc-v">${totalInvested>0?`<span class="${(totalSoldFor-totalInvested)>=0?'up':'dn'}">${(totalSoldFor-totalInvested)>=0?'+':''}${(((totalSoldFor-totalInvested)/totalInvested)*100).toFixed(1)}%</span>`:'—'}</div></div>
      <div><div class="sc-l">ROI on sold</div><div class="sc-v">${allSold.length>0&&(totalSoldFor-totalNetProfit)>0?`<span class="${totalNetProfit>=0?'up':'dn'}">${totalNetProfit>=0?'+':''}${((totalNetProfit/(totalSoldFor-totalNetProfit))*100).toFixed(1)}%</span>`:'—'}</div></div>
    </div></div>`;

  const recentHtml=`
    <div class="srow" style="margin-bottom:11px"><div class="srow-t">Recent purchases</div>
      ${recentPurchases.length?recentPurchases.map(c=>`<div class="recent-row">
        <div class="recent-info"><div class="rc-name">${c.fullCard||'—'}</div><div class="rc-date">${fmtShortDate(c.datePurchased||c.transactionDate)}</div></div>
        <div class="recent-price">$${safeNum(c.purchasePrice).toFixed(2)}</div>
      </div>`).join(''):'<div style="font-size:12px;color:var(--tx3);padding:4px 0">No recent purchases</div>'}
    </div>
    <div class="srow" style="margin-bottom:11px"><div class="srow-t">Recent sales</div>
      ${recentSales.length?recentSales.map(c=>{ const net=safeNum(c.netProfit,true); return `<div class="recent-row">
        <div class="recent-info"><div class="rc-name">${c.fullCard||'—'}</div><div class="rc-date">${fmtShortDate(c.transactionDate)}</div></div>
        <div class="recent-sale"><div class="rs-price">$${safeNum(c.salePrice).toFixed(2)}</div><div class="rs-net ${net>=0?'up':'dn'}">${net>=0?'+':''}$${Math.abs(net).toFixed(2)}</div></div>
      </div>`; }).join(''):'<div style="font-size:12px;color:var(--tx3);padding:4px 0">No recent sales</div>'}
    </div>`;

  const holdingsHtml=playerList.length?`
    <div class="section-hdr">All player cards</div>
    ${playerList.map(entry=>{
      const tier=entry.totalInvested>0?invTier(entry.totalInvested):null;
      const dispName=players.find(p=>normName(p.name)===entry.name)?.name||entry.name.replace(/\b\w/g,l=>l.toUpperCase());
      const ownedBadge=entry.ownedCards.length>0?`<span class="inv-badge ${tier}">${entry.ownedCards.length} owned · $${entry.totalInvested.toFixed(0)}</span>`:'';
      const soldBadge=entry.soldCards.length>0?`<span class="sold-badge" style="margin-left:4px">${entry.soldCards.length} sold · <span class="${entry.totalNet>=0?'up':'dn'}">${entry.totalNet>=0?'+':''}$${entry.totalNet.toFixed(2)}</span></span>`:'';
      return `<div class="ct-entry${entry.ownedCards.length>0?' owned':''} port-player" onclick="openPlayerFromPortfolio('${entry.name}')">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:14px;font-weight:500;flex:1">${dispName}</span>${ownedBadge}${soldBadge}
        </div>
        ${entry.ownedCards.length>0?`<div class="ct-row" style="margin-top:6px">${entry.ownedCards.map(c=>`<div class="ct-stat"><div class="ct-l">${(c.fullCard||'').split(' ').slice(0,3).join(' ')}</div><div class="ct-v">$${safeNum(c.purchasePrice).toFixed(2)}</div></div>`).join('')}</div>`:''}
      </div>`;
    }).join('')}`:'<div class="empty-msg" style="padding:20px 0">No prospect cards found</div>';

  document.getElementById('list').innerHTML=summaryHtml+recentHtml+holdingsHtml;
  document.getElementById('cntlbl').textContent=`${playerList.length} player${playerList.length===1?'':'s'}`;
}

function openPlayerFromPortfolio(nameLower) {
  const p=players.find(pl=>normName(pl.name)===nameLower);
  if(p){ showDetail(p,'player'); return; }
  const c=cards.find(cd=>normName(cd.player)===nameLower);
  if(c) showDetail({name:c.player.replace(/\b\w/g,l=>l.toUpperCase()),team:'',pos:'',aff:''},'player');
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); tab=t.dataset.t; sortBy='default'; window.scrollTo(0,0); render();
});
document.getElementById('sortchips').addEventListener('click',e=>{
  const c=e.target.closest('.schip'); if(!c) return;
  sortBy=c.dataset.s; render();
});
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); brf=c.dataset.f; render();
});
document.getElementById('chips2').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  document.querySelectorAll('#chips2 .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); posf=c.dataset.p; render();
});
document.getElementById('search').addEventListener('input',e=>{
  q=e.target.value.trim();
  document.getElementById('clear').classList.toggle('on',q.length>0);
  render();
});
document.getElementById('clear').addEventListener('click',()=>{
  document.getElementById('search').value=''; q='';
  document.getElementById('clear').classList.remove('on'); render();
});
document.getElementById('closebtn').addEventListener('click',()=>document.getElementById('mwrap').classList.remove('on'));
document.getElementById('mwrap').addEventListener('click',e=>{ if(e.target===document.getElementById('mwrap')) document.getElementById('mwrap').classList.remove('on'); });
document.getElementById('rfab').addEventListener('click',loadAll);

loadAll();
</script>
